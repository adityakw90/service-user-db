databaseChangeLog:
  - changeSet:
      id: 002-01-create-device-tables
      author: aditya
      changes:
        - createTable:
            tableName: device
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: device_fingerprint
                  type: TEXT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: device_name
                  type: VARCHAR(100)
              - column:
                  name: user_agent
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueDate: NOW()
                  constraints:
                    nullable: false

        - createTable:
            tableName: user_device
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_device_user_id
                    references: user(id)
              - column:
                  name: device_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_device_device_id
                    references: device(id)
              - column:
                  name: ip_address
                  type: INET
                  constraints:
                    nullable: false
              - column:
                  name: last_active_at
                  type: TIMESTAMPTZ
                  defaultValueDate: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMPTZ
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueDate: NOW()
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: user_device
            columnNames: user_id, device_id
            constraintName: pk_user_device

        - createIndex:
            tableName: user_device
            indexName: idx_user_device_device_id
            columns:
              - column:
                  name: device_id
