databaseChangeLog:
  - changeSet:
      id: 003-01-create-user-file
      author: aditya
      changes:
        - createTable:
            tableName: user_file
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_file_user_id
                    references: user(id)
              - column:
                  name: file_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: visibility
                  type: VARCHAR(20)
                  defaultValue: "private"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueDate: NOW()
                  constraints:
                    nullable: false

        - createIndex:
            tableName: user_file
            indexName: idx_user_file_user_id
            columns:
              - column:
                  name: user_id
